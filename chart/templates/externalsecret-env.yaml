# App environment (OAuth creds, stream key, typikon URL) pulled from Vault by ESO
# into the `youtube-ics-env` Secret, consumed via envFrom. Mirrors the melkite
# apps' <app>-env pattern. Seed once (off-repo):
#   vault kv put secret/melkite/youtube-ics \
#     GOOGLE_OAUTH_CLIENT_ID=... GOOGLE_OAUTH_CLIENT_SECRET=... \
#     GOOGLE_OAUTH_REFRESH_TOKEN=... YOUTUBE_STREAM_KEY=... TYPIKON_API_URL=...
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: youtube-ics-env
  labels:
    app: youtube-ics
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: youtube-ics-env
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app: youtube-ics
  dataFrom:
    - extract:
        key: {{ .Values.vaultKey }}
