# Singleton reconcile job. `run --once` does exactly one reconcile and exits, so a
# CronJob is the natural fit. concurrencyPolicy: Forbid is the singleton guarantee —
# two overlapping reconcile loops would race the YouTube API and could double-create
# or double-cancel broadcasts. Never run more than one at a time.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: youtube-ics
  labels:
    app: youtube-ics
spec:
  schedule: {{ .Values.schedule | quote }}
  timeZone: {{ .Values.timeZone | quote }}
  suspend: {{ .Values.suspend }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      # A reconcile is seconds of work; cap a hung run so it can't block the next
      # tick forever under concurrencyPolicy: Forbid.
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: youtube-ics
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: {{ .Values.imagePullSecretName }}
          # PodSecurity "restricted"-compliant. fsGroup makes the PVC (and the SQLite
          # store migrated into it) group-owned + group-writable by the non-root user.
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: youtube-ics
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["youtube-ics", "run", "--once"]
              env:
                - name: DB_PATH
                  value: {{ .Values.persistence.dbPath | quote }}
                - name: LOOKAHEAD_DAYS
                  value: {{ .Values.lookaheadDays | quote }}
                - name: HOME
                  value: /tmp
              envFrom:
                - secretRef:
                    name: youtube-ics-env
              volumeMounts:
                - name: data
                  mountPath: {{ dir .Values.persistence.dbPath | quote }}
                - name: tmp
                  mountPath: /tmp
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: youtube-ics-data
            - name: tmp
              emptyDir: {}
