name: validate

# PR gate (ADR-0007 Tier 1 / source track): proves the image builds before merge,
# WITHOUT pushing or signing (that happens only on merge to main, in build.yml).
# Runs on a GitHub-hosted runner — no JFrog/LAN or secrets needed for a push:false build.
# Branch protection requires the `validate` check to pass.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
