name: validate

# PR gate (ADR-0007 Tier 1 / source track): proves the image builds before merge,
# WITHOUT pushing or signing (that happens only on merge to main, in build.yml).
# Runs on a GitHub-hosted runner — no JFrog/LAN or secrets needed for a push:false build.
# Branch protection requires the `validate` check to pass.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
