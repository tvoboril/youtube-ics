name: build

# Build + publish youtube-ics on changes, on the self-hosted runner (LXC 106 on
# philip) so it can push to the LAN-only JFrog registry. Mirrors the melkite-synaxis
# _build-app.yml pattern:
#   image -> registry.voboril.xyz/melkite-docker/youtube-ics:<7-char-sha>  (PRIMARY)
#          + ghcr.io/tvoboril/youtube-ics:<7-char-sha>                     (BACKUP)
#   chart -> oci://registry.voboril.xyz/melkite-helm/youtube-ics:<Chart.yaml version>
#            (published only when that version isn't already there — bump to release)
# Talos + Argo pull from JFrog; Argo CD Image Updater tracks newest-build by SHA tag.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "chart/**"
      - "Dockerfile"
      - "pyproject.toml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write      # unused while GHCR is disabled; kept for easy re-enable
  id-token: write      # OIDC → cosign keyless signing (ADR-0007)

jobs:
  build:
    # Dedicated youtube-ics runner on LXC 106 (label homelab); self-hosted so it can
    # reach the LAN-only JFrog registry (registry.voboril.xyz -> 10.0.18.43).
    runs-on: [self-hosted, homelab]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to JFrog (primary — LAN)
        uses: docker/login-action@v3
        with:
          registry: registry.voboril.xyz
          username: ci-deployer
          password: ${{ secrets.JFROG_TOKEN }}

      # GHCR backup disabled — JFrog is the single registry (re-enable if a backup is
      # wanted; we sign with cosign against JFrog instead of GitHub's attestation store,
      # which needs a public repo). ADR-0007.
      # - name: Log in to GHCR (backup)
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (linux/amd64) — JFrog primary
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          provenance: mode=max   # attach SLSA provenance to the image (BuildKit, ADR-0007)
          sbom: true             # attach an SPDX SBOM to the image
          tags: |
            registry.voboril.xyz/melkite-docker/youtube-ics:${{ steps.meta.outputs.sha }}
            # ghcr.io/tvoboril/youtube-ics:${{ steps.meta.outputs.sha }}   # GHCR backup disabled
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # --- Sign the image (SLSA Build L2, ADR-0007) -----------------------------
      # Keyless cosign signature bound to this workflow's OIDC identity, pushed to the
      # JFrog image. Provider-neutral and works for PRIVATE repos (GitHub's attestation
      # store requires a public repo on the free plan). SLSA provenance + SBOM are
      # attached to the image by BuildKit (provenance/sbom above); cosign-signing the
      # image digest binds them — tampering breaks the signature.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless) → JFrog
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "registry.voboril.xyz/melkite-docker/youtube-ics@${DIGEST}"

      # Publish the Helm chart to JFrog OCI only when Chart.yaml's version isn't already
      # published — code-only builds skip it; bump chart/Chart.yaml to release a new one.
      - name: Log in to JFrog for Helm (OCI)
        run: |
          export PATH="/usr/local/bin:$PATH"
          echo "${{ secrets.JFROG_TOKEN }}" | helm registry login registry.voboril.xyz -u ci-deployer --password-stdin

      - name: Publish Helm chart if version is new
        # The ci-deployer token can push new chart versions but not overwrite an existing
        # one (and has no read on melkite-helm), so we can't pre-check with `helm pull`.
        # Instead: always attempt the push; treat JFrog's "no permission to overwrite"
        # 403 as an intentional skip (the version is already published — bump
        # chart/Chart.yaml to release a new one).
        run: |
          set -euo pipefail
          export PATH="/usr/local/bin:$PATH"
          CHART_DIR="chart"
          VER="$(awk '/^version:/{print $2; exit}' "$CHART_DIR/Chart.yaml")"
          echo "chart youtube-ics version $VER"
          helm package "$CHART_DIR" -d /tmp/chartpkg
          if helm push "/tmp/chartpkg/youtube-ics-$VER.tgz" oci://registry.voboril.xyz/melkite-helm 2>/tmp/helmpush.err; then
            echo "published chart youtube-ics:$VER"
          elif grep -qiE "overwrite|already exists" /tmp/helmpush.err; then
            echo "chart youtube-ics:$VER already published — skipping (bump chart/Chart.yaml to release a new one)"
          else
            cat /tmp/helmpush.err >&2
            exit 1
          fi
