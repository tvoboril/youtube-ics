name: build

# Build + publish youtube-ics on GitHub-HOSTED runners (ubuntu-latest) — ephemeral &
# isolated per SLSA Build L3 — pushing to JFrog over its public Cloudflare endpoint
# (registry.voboril.xyz) with the ci-deployer token. The `provenance` job then produces
# NON-FALSIFIABLE SLSA L3 provenance via the trusted slsa-github-generator reusable workflow.
#   image -> registry.voboril.xyz/melkite-docker/youtube-ics:<7-char-sha>
#   chart -> oci://registry.voboril.xyz/melkite-helm/youtube-ics:<Chart.yaml version>
# Talos + Argo pull from JFrog LAN-direct; Argo CD Image Updater tracks newest-build.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "chart/**"
      - "Dockerfile"
      - "pyproject.toml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest        # GitHub-hosted → ephemeral & isolated (SLSA L3 env)
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Image name (no tag/digest — for the SLSA generator)
        id: image
        run: echo "image=registry.voboril.xyz/melkite-docker/youtube-ics" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to JFrog (public Cloudflare endpoint)
        uses: docker/login-action@v3
        with:
          registry: registry.voboril.xyz
          username: ci-deployer
          password: ${{ secrets.JFROG_TOKEN }}

      # SCAN-BEFORE-PUSH: build into the local docker daemon (no push, single-platform).
      # BuildKit provenance/sbom dropped here (load can't take an OCI index; the L3
      # provenance comes from the slsa-github-generator job below).
      - name: Build & load (no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: registry.voboril.xyz/melkite-docker/youtube-ics:${{ steps.meta.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # Vulnerability scan — Phase E. Scans the LOCAL image BEFORE it is pushed: a fixable
      # CRITICAL fails the build and the image is NEVER pushed → nothing to sign, deploy, or
      # roll back; the app stays on its last-good image, invisibly. Counts CRITICALs from
      # JSON so a trivy error yields 0 and does not fail the build.
      - name: Scan image for vulnerabilities (trivy — gate on fixable CRITICAL)
        env:
          TRIVY_DISABLE_VEX_NOTICE: "1"
          IMG: registry.voboril.xyz/melkite-docker/youtube-ics:${{ steps.meta.outputs.sha }}
        run: |
          set -euo pipefail
          command -v trivy >/dev/null 2>&1 || curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$HOME/.local/bin"
          export PATH="$HOME/.local/bin:$PATH"
          trivy image --severity HIGH,CRITICAL --ignore-unfixed --format table "$IMG" || true   # informational (local image)
          CRIT=$(trivy image --severity CRITICAL --ignore-unfixed --format json "$IMG" 2>/dev/null | jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' 2>/dev/null || echo 0)
          echo "fixable CRITICAL count: ${CRIT:-0}"
          if [ "${CRIT:-0}" -gt 0 ]; then echo "::error::${CRIT} fixable CRITICAL vuln(s) — NOT pushing this image"; exit 1; fi

      - name: Push clean image → JFrog
        id: push
        run: |
          set -euo pipefail
          IMG="registry.voboril.xyz/melkite-docker/youtube-ics:${{ steps.meta.outputs.sha }}"
          docker push "$IMG"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMG" | sed 's/.*@//')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "pushed $IMG @ $DIGEST"

      # Keyless cosign signature (Kyverno admission verifies this — unchanged).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "registry.voboril.xyz/melkite-docker/youtube-ics@${DIGEST}"

      # Helm chart (helm isn't preinstalled on GitHub-hosted runners).
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Log in to JFrog for Helm (OCI)
        run: echo "${{ secrets.JFROG_TOKEN }}" | helm registry login registry.voboril.xyz -u ci-deployer --password-stdin
      - name: Publish Helm chart if version is new
        run: |
          set -euo pipefail
          CHART_DIR="chart"
          VER="$(awk '/^version:/{print $2; exit}' "$CHART_DIR/Chart.yaml")"
          echo "chart youtube-ics version $VER"
          helm package "$CHART_DIR" -d /tmp/chartpkg
          if helm push "/tmp/chartpkg/youtube-ics-$VER.tgz" oci://registry.voboril.xyz/melkite-helm 2>/tmp/helmpush.err; then
            echo "published chart youtube-ics:$VER"
          elif grep -qiE "overwrite|already exists" /tmp/helmpush.err; then
            echo "chart youtube-ics:$VER already published — skipping (bump chart/Chart.yaml)"
          else
            cat /tmp/helmpush.err >&2; exit 1
          fi

  # --- SLSA Build L3 provenance (non-falsifiable) ----------------------------
  # Runs in the trusted, isolated slsa-github-generator reusable workflow. Generates
  # and signs SLSA provenance for the image digest and pushes it to JFrog as an
  # attestation (verify with slsa-verifier or `cosign verify-attestation`).
  provenance:
    needs: [build]
    permissions:
      actions: read       # read the workflow run to build provenance
      id-token: write      # keyless signing of the provenance
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.build.outputs.image }}
      digest: ${{ needs.build.outputs.digest }}
      registry-username: ci-deployer
    secrets:
      registry-password: ${{ secrets.JFROG_TOKEN }}
